<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Australian Dentists Clinic — Virtual Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Playfair+Display:wght@500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #1a5fa8; --blue-light: #e8f1fb; --blue-dark: #0f3d6e;
    --white: #ffffff; --bg: #f4f7fb; --text: #1c2b3a;
    --muted: #6b7f92; --border: #dce6f0; --green: #22c55e;
    --radius: 18px; --radius-sm: 10px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
  #chat-screen { display: flex; flex-direction: column; width: 100%; max-width: 440px; height: 92vh; max-height: 700px; background: var(--white); border-radius: var(--radius); box-shadow: 0 8px 40px rgba(26,95,168,0.12); overflow: hidden; }
  .chat-header { background: var(--blue); padding: 16px 18px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .header-avatar { width: 42px; height: 42px; border-radius: 50%; background: rgba(255,255,255,0.18); display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .header-name { color: #fff; font-size: 15px; font-weight: 500; }
  .header-status { color: rgba(255,255,255,0.8); font-size: 12px; margin-top: 2px; }
  #messages { flex: 1; overflow-y: auto; padding: 16px 14px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 84%; padding: 10px 14px; font-size: 14px; line-height: 1.55; border-radius: 18px; }
  .bot-msg { background: var(--blue-light); color: var(--text); border-bottom-left-radius: 4px; align-self: flex-start; }
  .user-msg { background: var(--blue); color: #fff; border-bottom-right-radius: 4px; align-self: flex-end; }
  .input-area { padding: 10px 12px 14px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: center; }
  #user-input { flex: 1; border: 1.5px solid var(--border); border-radius: 24px; padding: 10px 16px; background: var(--bg); outline: none; }
  #send-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--blue); border: none; cursor: pointer; color: white; }
</style>
</head>
<body>

<div id="chat-screen">
  <div class="chat-header">
    <div class="header-avatar">🦷</div>
    <div class="header-info">
      <div class="header-name">Australian Dentists Clinic</div>
      <div class="header-status">Online — Ready to help</div>
    </div>
  </div>
  <div id="messages"></div>
  <div class="input-area">
    <input id="user-input" type="text" placeholder="Type your message..." />
    <button id="send-btn" onclick="handleSend()">➤</button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `You are a friendly and professional virtual assistant for Australian Dentists Clinic. Keep replies concise (2-4 sentences). Always end with a booking call to action.`;
let chatHistory = [];

// Welcoming message
window.onload = () => addBotMessage("G'day! Welcome to Australian Dentists Clinic. How can I assist you today?");

function addBotMessage(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot-msg';
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

async function handleSend() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;
  
  // Add User Message
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg user-msg';
  div.textContent = text;
  msgs.appendChild(div);
  input.value = '';

  chatHistory.push({ role: 'user', parts: [{ text: text }] });

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        systemPrompt: SYSTEM_PROMPT,
        messages: chatHistory
      })
    });

    const data = await res.json();
    const reply = data.candidates[0].content.parts[0].text;
    chatHistory.push({ role: 'model', parts: [{ text: reply }] });
    addBotMessage(reply);
  } catch (e) {
    addBotMessage('Sorry, connection error. Please try again.');
  }
}
</script>
</body>
</html>
