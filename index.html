<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Australian Dentists Clinic — Virtual Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Playfair+Display:wght@500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #1a5fa8;
    --blue-light: #e8f1fb;
    --blue-dark: #0f3d6e;
    --white: #ffffff;
    --bg: #f4f7fb;
    --text: #1c2b3a;
    --muted: #6b7f92;
    --border: #dce6f0;
    --green: #22c55e;
    --radius: 18px;
    --radius-sm: 10px;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 1rem;
  }
  #setup-screen {
    background: var(--white);
    border-radius: var(--radius);
    padding: 2.5rem 2rem;
    max-width: 400px;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 40px rgba(26,95,168,0.10);
  }
  .setup-logo {
    width: 64px; height: 64px;
    background: var(--blue);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.2rem;
    font-size: 28px;
  }
  .setup-title { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--text); margin-bottom: 0.4rem; }
  .setup-sub { font-size: 14px; color: var(--muted); margin-bottom: 1.8rem; line-height: 1.6; }
  .setup-label { font-size: 13px; color: var(--muted); text-align: left; margin-bottom: 0.4rem; display: block; }
  .setup-input {
    width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    padding: 11px 14px; font-size: 14px; font-family: 'DM Sans', sans-serif;
    color: var(--text); outline: none; background: var(--bg);
    transition: border-color 0.2s; margin-bottom: 1rem;
  }
  .setup-input:focus { border-color: var(--blue); }
  .setup-btn {
    width: 100%; background: var(--blue); color: #fff; border: none;
    border-radius: var(--radius-sm); padding: 12px; font-size: 15px;
    font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer;
    transition: background 0.2s;
  }
  .setup-btn:hover { background: var(--blue-dark); }
  .setup-note { font-size: 12px; color: var(--muted); margin-top: 1rem; line-height: 1.5; }
  .error-msg { color: #dc2626; font-size: 13px; margin-top: -0.6rem; margin-bottom: 0.8rem; text-align: left; }

  #chat-screen {
    display: none; flex-direction: column;
    width: 100%; max-width: 440px;
    height: 92vh; max-height: 700px;
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: 0 8px 40px rgba(26,95,168,0.12);
    overflow: hidden;
  }
  .chat-header {
    background: var(--blue); padding: 16px 18px;
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  .header-avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: rgba(255,255,255,0.18);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .header-info { flex: 1; }
  .header-name { color: #fff; font-size: 15px; font-weight: 500; }
  .header-status { color: rgba(255,255,255,0.8); font-size: 12px; display: flex; align-items: center; gap: 5px; margin-top: 2px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }

  #messages {
    flex: 1; overflow-y: auto; padding: 16px 14px;
    display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    max-width: 84%; padding: 10px 14px; font-size: 14px;
    line-height: 1.55; border-radius: 18px;
    animation: fadeUp 0.25s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .bot-msg { background: var(--blue-light); color: var(--text); border-bottom-left-radius: 4px; align-self: flex-start; }
  .user-msg { background: var(--blue); color: #fff; border-bottom-right-radius: 4px; align-self: flex-end; }
  .typing-msg { background: var(--blue-light); align-self: flex-start; border-bottom-left-radius: 4px; padding: 14px 16px; }
  .typing-dots { display: flex; gap: 4px; align-items: center; }
  .typing-dots span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--blue); animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  #quick-btns { padding: 8px 14px 4px; display: flex; flex-wrap: wrap; gap: 6px; flex-shrink: 0; }
  .qbtn {
    background: var(--white); border: 1.5px solid var(--blue);
    color: var(--blue); border-radius: 20px; padding: 5px 13px;
    font-size: 12.5px; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: all 0.18s; white-space: nowrap;
  }
  .qbtn:hover { background: var(--blue); color: #fff; }

  .input-area {
    padding: 10px 12px 14px; border-top: 1px solid var(--border);
    display: flex; gap: 8px; align-items: center; flex-shrink: 0;
  }
  #user-input {
    flex: 1; border: 1.5px solid var(--border); border-radius: 24px;
    padding: 10px 16px; font-size: 14px; font-family: 'DM Sans', sans-serif;
    color: var(--text); background: var(--bg); outline: none;
    transition: border-color 0.2s;
  }
  #user-input:focus { border-color: var(--blue); }
  #send-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--blue); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.2s;
  }
  #send-btn:hover { background: var(--blue-dark); }
  #send-btn svg { fill: #fff; }
</style>
</head>
<body>

<div id="setup-screen">
  <div class="setup-logo">🦷</div>
  <h1 class="setup-title">Australian Dentists Clinic</h1>
  <p class="setup-sub">AI-powered virtual assistant.<br/>Enter your Google Gemini API key to begin.</p>
  <label class="setup-label">Gemini API Key</label>
  <input class="setup-input" id="api-input" type="password" placeholder="AIza..." />
  <p id="setup-error" class="error-msg" style="display:none;">Please enter a valid Gemini API key</p>
  <button class="setup-btn" onclick="startChat()">Launch Assistant</button>
  <p class="setup-note">Your key stays in your browser only.<br/>Never shared with anyone except Google.</p>
</div>

<div id="chat-screen">
  <div class="chat-header">
    <div class="header-avatar">🦷</div>
    <div class="header-info">
      <div class="header-name">Australian Dentists Clinic</div>
      <div class="header-status"><span class="status-dot"></span> Online — Ready to help</div>
    </div>
  </div>

  <div id="messages"></div>

  <div id="quick-btns">
    <button class="qbtn" onclick="sendQuick('I want to book an appointment')">📅 Book Appointment</button>
    <button class="qbtn" onclick="sendQuick('What are your clinic locations?')">📍 Locations</button>
    <button class="qbtn" onclick="sendQuick('What are your opening hours?')">🕐 Hours</button>
    <button class="qbtn" onclick="sendQuick('What treatments do you offer?')">🦷 Treatments</button>
    <button class="qbtn" onclick="sendQuick('What are your current offers and prices?')">💰 Offers</button>
    <button class="qbtn" onclick="sendQuick('I have a dental emergency')">🚨 Emergency</button>
  </div>

  <div class="input-area">
    <input id="user-input" type="text" placeholder="Type your message..." />
    <button id="send-btn" onclick="handleSend()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `You are a friendly and professional virtual assistant for Australian Dentists Clinic.

CLINIC INFO:
- Website: https://dentistsclinic.com.au
- Book Online: https://dentistsclinic.com.au/appointment.html

LOCATIONS:
1. Melbourne CBD — Level 3, 620 Bourke Street, Melbourne VIC 3000 | (03) 9088 0257
2. Box Hill — Suite 18/32 Arnold Street, Box Hill VIC 3128 | (03) 8547 9556

HOURS:
- Melbourne CBD: 7 days a week
- Box Hill: Mon–Fri 9am–6pm, Sat 9am–5pm, Sun Closed

SPECIAL OFFERS:
- $60 Dental Check-Up (new patients)
- $99 Check-Up & Clean (new patients, weekdays only)
- $399 Teeth Whitening (save $320)
- $899 Dental Crowns (Melbourne CBD)
- $4,999 Clear Aligners (Box Hill, save $1,000+)
- Free care for eligible kids and seniors

SERVICES: General dentistry, cosmetic dentistry, emergency dental, family dental, teeth whitening, implants, Invisalign, crowns, veneers, root canal, wisdom teeth, fillings, extractions

INSURANCE: All major private health funds accepted — BUPA, NIB, AHM, HBA, CBHS, Medibank, HCF, Australian Unity, HBF

LANGUAGES: English, Korean, Cantonese, Mandarin available on request

RULES:
- Be warm, friendly, and professional
- Keep replies concise (2-4 sentences)
- Always end with a booking call to action
- For emergencies: call immediately, same-day appointments available
- Unknown info: direct to (03) 9088 0257
- Never make up information not listed above`;

let apiKey = '';
let history = [];

function startChat() {
  const key = document.getElementById('api-input').value.trim();
  const err = document.getElementById('setup-error');
  if (!key || key.length < 10) { err.style.display = 'block'; return; }
  err.style.display = 'none';
  apiKey = key;
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('chat-screen').style.display = 'flex';
  addBotMessage("G'day! 👋 Welcome to Australian Dentists Clinic. I can help you with appointments, treatments, pricing, and locations. How can I assist you today?");
}

document.getElementById('user-input').addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });

function addBotMessage(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot-msg';
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addUserMessage(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg user-msg';
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg typing-msg'; div.id = 'typing';
  div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

function sendQuick(text) { document.getElementById('user-input').value = text; handleSend(); }

async function handleSend() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addUserMessage(text);
  history.push({ role: 'user', parts: [{ text }] });
  showTyping();

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
          contents: history
        })
      }
    );

    const data = await res.json();
    removeTyping();

    if (data.candidates && data.candidates[0]) {
      const reply = data.candidates[0].content.parts[0].text;
      history.push({ role: 'model', parts: [{ text: reply }] });
      addBotMessage(reply);
    } else {
      addBotMessage('Sorry, something went wrong. Please try again.');
      console.error(data);
    }
  } catch (err) {
    removeTyping();
    addBotMessage('Connection error. Please check your API key and try again.');
  }
}
</script>
</body>
</html>
